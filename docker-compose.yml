services:
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: horde-bgutil-pot
    init: true
    restart: unless-stopped

  horde:
    build: .
    image: horde:latest
    container_name: horde
    depends_on:
      - bgutil-pot
    ports:
      - "8686:8080"
    environment:
      # UID/GID that owns the TrueNAS dataset (see README).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DOWNLOADS_DIR=/downloads
      - DATA_DIR=/app/data
      - SCAN_INTERVAL_SEC=${SCAN_INTERVAL_SEC:-60}
      - YTDLP_POT_BASE_URL=${YTDLP_POT_BASE_URL:-http://bgutil-pot:4416}
      - YTDLP_COOKIE_FILE=${YTDLP_COOKIE_FILE:-}
      - YTDLP_COOKIES_FROM_BROWSER=${YTDLP_COOKIES_FROM_BROWSER:-}
    volumes:
      # Media library on your ZFS dataset.
      - ${DOWNLOADS_PATH:-/mnt/tank/media/youtube_archive}:/downloads
      # Persistent SQLite DB + cached thumbnails.
      - ${DATA_PATH:-/opt/dockge/horde/data}:/app/data
    restart: unless-stopped
