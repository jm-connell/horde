services:
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: horde-bgutil-pot
    init: true
    restart: unless-stopped

  # Optional local LLM. Start with: docker compose --profile ai up -d
  # For a GPU on another machine, leave this off and set OLLAMA_BASE_URL
  # (or Settings → AI) to that host, e.g. http://192.168.1.50:11434
  ollama:
    image: ollama/ollama:latest
    container_name: horde-ollama
    profiles: ["ai"]
    volumes:
      - ${OLLAMA_DATA_PATH:-./ollama}:/root/.ollama
    # Uncomment for NVIDIA GPU passthrough when Ollama runs on this host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  horde:
    build:
      context: .
      args:
        HORDE_GIT_SHA: ${HORDE_GIT_SHA:-unknown}
    image: horde:latest
    container_name: horde
    depends_on:
      - bgutil-pot
    ports:
      - "8686:8080"
    environment:
      # UID/GID that owns the TrueNAS dataset (see README).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DOWNLOADS_DIR=/downloads
      - DATA_DIR=/app/data
      - SCAN_INTERVAL_SEC=${SCAN_INTERVAL_SEC:-60}
      - YTDLP_POT_BASE_URL=${YTDLP_POT_BASE_URL:-http://bgutil-pot:4416}
      - YTDLP_COOKIE_FILE=${YTDLP_COOKIE_FILE:-}
      - YTDLP_COOKIES_FROM_BROWSER=${YTDLP_COOKIES_FROM_BROWSER:-}
      # Empty = auto-discover (ollama compose service, then host.docker.internal).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # Baked at build time; override only if needed. Repo for update checks:
      - HORDE_GITHUB_REPO=${HORDE_GITHUB_REPO:-jm-connell/horde}
    volumes:
      # Media library on your ZFS dataset.
      - ${DOWNLOADS_PATH:-/mnt/tank/media/youtube_archive}:/downloads
      # Persistent SQLite DB + cached thumbnails.
      - ${DATA_PATH:-/opt/dockge/horde/data}:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
