services:
  horde:
    build: .
    image: horde:latest
    container_name: horde
    ports:
      - "8080:8080"
    environment:
      # UID/GID that owns the TrueNAS dataset (see README).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DOWNLOADS_DIR=/downloads
      - DATA_DIR=/app/data
      - SCAN_INTERVAL_SEC=${SCAN_INTERVAL_SEC:-60}
    volumes:
      # Media library on your ZFS dataset.
      - ${DOWNLOADS_PATH:-/mnt/tank/media/youtube_archive}:/downloads
      # Persistent SQLite DB + cached thumbnails.
      - ${DATA_PATH:-/opt/dockge/horde/data}:/app/data
    restart: unless-stopped
